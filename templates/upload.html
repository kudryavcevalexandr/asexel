{% extends "base.html" %}
{% block content %}
<section class="card hero">
  <p class="muted">CSV STUDIO</p>
  <h1>Редактируйте CSV прямо в браузере</h1>
  <p class="muted">Загрузите CSV-файл, настройте фильтры и просмотрите данные.</p>
  {% for message in get_flashed_messages() %}<div class="notice">{{ message }}</div>{% endfor %}
  <div class="notice upload-error" id="upload-error" hidden></div>
  <form method="post" action="{{ url_for('upload') }}" enctype="multipart/form-data" id="upload-form">
    <label class="drop"><b>Выберите файл .csv</b><br><br><input type="file" name="csv_file" accept=".csv,text/csv" required></label>
    <button class="btn" id="upload-button">Загрузить и открыть →</button>
  </form>
</section>
<script>
  const uploadForm = document.getElementById("upload-form");
  const uploadError = document.getElementById("upload-error");
  const uploadButton = document.getElementById("upload-button");

  function showUploadError(message) {
    uploadError.textContent = message;
    uploadError.hidden = false;
  }

  uploadForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    uploadError.hidden = true;
    const selectedFile = uploadForm.elements.csv_file.files[0];
    if (!selectedFile) {
      showUploadError("Файл не выбран. Выберите CSV-файл .csv и повторите загрузку.");
      return;
    }
    if (!selectedFile.name.toLowerCase().endsWith(".csv")) {
      showUploadError(`Выбран файл «${selectedFile.name}», но поддерживается только формат .csv.`);
      return;
    }
    const originalButtonText = uploadButton.textContent;
    uploadButton.disabled = true;
    uploadButton.textContent = "Загрузка…";
    try {
      const response = await fetch(uploadForm.action, {
        method: "POST",
        body: new FormData(uploadForm),
        headers: {"X-Requested-With": "XMLHttpRequest", "Accept": "application/json"},
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        showUploadError(data.message || `Сервер отклонил файл с кодом ${response.status}.`);
        return;
      }
      window.location.assign(data.redirect);
    } catch (error) {
      showUploadError(
        `Браузер не смог передать файл «${selectedFile.name}» на сервер. ` +
        "Частая причина на Android/Chrome — выбранный файл изменился, синхронизируется облаком или открыт другим приложением во время загрузки (ERR_UPLOAD_FILE_CHANGED). " +
        "Скопируйте файл в локальную папку Downloads/Загрузки, закройте редактор таблиц/файловый менеджер и выберите эту копию заново. " +
        `Технические детали: ${error.name}: ${error.message}`
      );
    } finally {
      uploadButton.disabled = false;
      uploadButton.textContent = originalButtonText;
    }
  });
</script>
{% endblock %}
